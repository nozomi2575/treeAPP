<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>樹皮判別</title>
</head>

<body>
  <h2>樹皮判別アプリ</h2>
  <button id="startBtn">開始</button>
  <br><br>

  <video id="webcam" autoplay playsinline width="300"></video>
  <div id="label-container"></div>

  <!-- ★必ず閉じる -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/vcoNkn6Is/";

    let model, webcam;

    document.getElementById("startBtn").addEventListener("click", async () => {
      try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);

        webcam = new tmImage.Webcam(300, 300, false);
        await webcam.setup({ facingMode: "environment" });
        await webcam.play();

        document.getElementById("webcam").srcObject = webcam.webcam.srcObject;

      } catch (e) {
        alert(e);
      }
    });
  </script>
</body>
</html>
