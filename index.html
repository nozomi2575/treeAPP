<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹種＋直径測定（手スケール）</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

#version {
  font-size: 18px;
  color: gray;
  margin-top: 8px;
}

h2 {
  font-size: 32px;
}

button {
  font-size: 26px;
  padding: 12px 30px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

#startBtn { background: #2ecc71; }
#setHandBtn { background: orange; }

#videoWrapper {
  position: relative;
}

#webcam {
  width: 95vw;
  max-width: 600px;
}

#line {
  position: absolute;
  left: 50%;
  width: 4px;
  height: 100%;
  background: red;
}

.box {
  background: rgba(0,0,0,0.7);
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

#species { font-size: 50px; color: cyan; }
#result { font-size: 70px; }
#sub { font-size: 30px; color: gray; }
#status { font-size: 28px; }
</style>
</head>

<body>

<div id="version">v3.0 手スケール</div>

<h2>樹種＋直径測定</h2>

<button id="startBtn">▶開始</button>
<button id="setHandBtn">✋手を登録</button>

<div id="videoWrapper">
  <video id="webcam" playsinline></video>
  <div id="line"></div>
</div>

<div class="box">
  <div id="species">---</div>
  <div id="result">-- cm</div>
  <div id="status">待機中</div>
  <div id="sub">暫定：-- cm</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/vcoNkn6Is/";

// ★ここだけ自分の手に合わせる
const HAND_REAL_CM = 18;

let model, video;

let handScale = null;

let history = [];
let diameterHistory = [];

document.getElementById("startBtn").onclick = init;
document.getElementById("setHandBtn").onclick = registerHand;

async function init() {
  model = await tmImage.load(URL+"model.json", URL+"metadata.json");

  video = document.getElementById("webcam");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    loop();
  };
}

// ===== 手登録 =====
function registerHand() {
  const width = detectWidth();

  if (width > 0) {
    handScale = HAND_REAL_CM / width;
    alert("手を登録しました");
  } else {
    alert("手がうまく検出できません");
  }
}

// ===== メインループ =====
async function loop() {
  if (video.readyState === 4) {

    // ===== 樹種 =====
    const prediction = await model.predict(video);

    let best = prediction.sort((a,b)=>b.probability-a.probability)[0];

    document.getElementById("species").innerText =
      best.probability > 0.7 ? best.className : "該当なし";

    // ===== 幅 =====
    const width = detectWidth();

    if (width === 0 || !handScale) {
      document.getElementById("status").innerText = "測定不可";
      requestAnimationFrame(loop);
      return;
    }

    let diameter = Math.round(width * handScale);

    diameterHistory.push(diameter);
    if (diameterHistory.length > 5) diameterHistory.shift();

    let avg = diameterHistory.reduce((a,b)=>a+b,0) / diameterHistory.length;
    avg = Math.round(avg);

    document.getElementById("result").innerText = avg + " cm";
    document.getElementById("sub").innerText = "暫定：" + diameter + " cm";
    document.getElementById("status").innerText = "測定中";

  }

  requestAnimationFrame(loop);
}

// ===== 幅検出（エッジ） =====
function detectWidth() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

  const w = canvas.width;
  const h = canvas.height;
  const center = Math.floor(w/2);

  let left = center;
  let right = center;

  for (let x = center; x > 5; x--) {
    const i = (Math.floor(h/2)*w + x)*4;
    const i2 = (Math.floor(h/2)*w + (x-5))*4;

    const diff =
      Math.abs(img.data[i]-img.data[i2]) +
      Math.abs(img.data[i+1]-img.data[i2+1]) +
      Math.abs(img.data[i+2]-img.data[i2+2]);

    if (diff > 60) break;
    left = x;
  }

  for (let x = center; x < w-5; x++) {
    const i = (Math.floor(h/2)*w + x)*4;
    const i2 = (Math.floor(h/2)*w + (x+5))*4;

    const diff =
      Math.abs(img.data[i]-img.data[i2]) +
      Math.abs(img.data[i+1]-img.data[i2+1]) +
      Math.abs(img.data[i+2]-img.data[i2+2]);

    if (diff > 60) break;
    right = x;
  }

  const width = right - left;

  if (width < 20 || width > w*0.9) return 0;

  return width;
}
</script>

</body>
</html>
