<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹種＋直径測定 v8.2</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

button {
  width: 90%;
  font-size: 28px;
  padding: 20px;
  margin: 10px;
  border-radius: 12px;
}

#startBtn { background: #2ecc71; }
#handBtn { background: orange; }

video {
  width: 95%;
  max-width: 600px;
}

.box {
  font-size: 30px;
  margin-top: 10px;
}

#status { font-size: 28px; color: yellow; }
#error { color: red; font-size: 20px; }
</style>
</head>

<body>

<h2>v8.2 カメラ確実起動版</h2>

<button id="startBtn">▶ 開始</button>
<button id="handBtn">✋ 手登録</button>

<br>
<video id="webcam" autoplay playsinline></video>

<div class="box">
  <div id="result">-- cm</div>
  <div id="status">待機中</div>
  <div id="error"></div>
</div>

<script>
let video = document.getElementById("webcam");

// =========================
// カメラ起動（超安全版）
// =========================
async function startCamera() {

  // ★HTTPSチェック
  if (location.protocol !== "https:" && location.hostname !== "localhost") {
    document.getElementById("error").innerText =
      "⚠ HTTPSまたはlocalhostで開いてください";
    return;
  }

  try {

    document.getElementById("status").innerText = "カメラ起動中...";

    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: false
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      document.getElementById("status").innerText = "カメラ起動成功";
      loop();
    };

  } catch (e) {

    document.getElementById("error").innerText =
      "カメラエラー: " + e.message;

    document.getElementById("status").innerText = "起動失敗";
  }
}

document.getElementById("startBtn").onclick = startCamera;


// =========================
// 簡易検出（確実に反応）
// =========================
function detectWidth() {

  if (!video.videoWidth) return 0;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

  const w = canvas.width;
  const h = canvas.height;

  const y = Math.floor(h * 0.5);

  let left = -1;
  let right = -1;

  for (let x = 0; x < w; x++) {

    const i = (y*w + x) * 4;
    const gray = (img.data[i]+img.data[i+1]+img.data[i+2])/3;

    if (gray > 60 && gray < 200) {
      if (left === -1) left = x;
      right = x;
    }
  }

  if (left === -1 || right === -1) return 0;

  return right - left;
}


// =========================
// ループ
// =========================
function loop() {

  let width = detectWidth();

  if (width > 0) {
    document.getElementById("result").innerText =
      "検出幅: " + width + " px";
    document.getElementById("status").innerText = "検出中";
  } else {
    document.getElementById("status").innerText = "対象を映してください";
  }

  requestAnimationFrame(loop);
}

</script>

</body>
</html>
