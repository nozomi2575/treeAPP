<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹種＋直径測定</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

#version {
  font-size: 18px;
  color: gray;
  margin-top: 8px;
}

h2 {
  font-size: 32px;
  margin: 5px 0;
}

#startBtn {
  font-size: 32px;
  padding: 18px 50px;
  border-radius: 12px;
  border: none;
  background: #2ecc71;
  color: white;
}

#videoWrapper {
  position: relative;
  display: inline-block;
}

#webcam {
  width: 98vw;
  max-width: 600px;
  border-radius: 14px;
}

#line {
  position: absolute;
  top: 0;
  left: 50%;
  width: 5px;
  height: 100%;
  background: red;
  opacity: 0.85;
}

.box {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 14px;
  margin: 15px auto;
  width: 95vw;
  max-width: 600px;
}

#species {
  font-size: 60px;
  font-weight: bold;
  color: #00ffff;
}

#result {
  font-size: 80px;
  font-weight: bold;
}

#status {
  font-size: 30px;
  margin: 10px 0;
}

#distance {
  font-size: 30px;
  margin: 10px 0;
}

#subResult {
  font-size: 28px;
  color: lightgray;
}

@keyframes blink {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}

.measuring {
  animation: blink 1s infinite;
}
</style>
</head>

<body>

<div id="version">樹種＋直径測定 v2.4</div>

<h2>樹種＋直径測定</h2>

<button id="startBtn">▶ 開始</button><br><br>

<div id="videoWrapper">
  <video id="webcam" playsinline></video>
  <div id="line"></div>
</div>

<div class="box">
  <div id="species">---</div>
  <div id="result">-- cm</div>
  <div id="status">待機中</div>
  <div id="distance">距離：---</div>
  <div id="subResult">暫定値：-- cm</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/vcoNkn6Is/";

let model, video;

let history = [];
const MAX_HISTORY = 10;

let diameterHistory = [];
const MAX_DIAMETER_HISTORY = 10;
let prevDiameter = 0;

let stableCount = 0;
let stableDiameter = 0;
const STABLE_THRESHOLD = 1;
const STABLE_FRAMES = 5;

let lastTempDiameter = "--";

const THRESHOLD = 0.7;
const DIFF_THRESHOLD = 0.1;

const SCALE = 0.5; // ★重要：少し上げる

document.getElementById("startBtn").addEventListener("click", init);

async function init() {
  const modelURL = URL + "model.json";
  const metadataURL = URL + "metadata.json";

  model = await tmImage.load(modelURL, metadataURL);

  video = document.getElementById("webcam");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    loop();
  };
}

// ===== 距離判定 =====
function getDistanceLabel(width, videoWidth) {
  const ratio = width / videoWidth;

  if (ratio > 0.6) return ["近すぎ", "red"];
  if (ratio > 0.35) return ["適正距離", "lime"];
  if (ratio > 0.15) return ["やや遠い", "orange"];
  return ["遠い", "orange"];
}

async function loop() {
  if (video.readyState === 4) {

    // ===== 樹種 =====
    const prediction = await model.predict(video);

    history.push(prediction);
    if (history.length > MAX_HISTORY) history.shift();

    let avg = {};
    history.forEach(p => {
      p.forEach(item => {
        avg[item.className] = (avg[item.className] || 0) + item.probability;
      });
    });

    let sorted = Object.keys(avg).map(k => ({
      className: k,
      probability: avg[k] / history.length
    })).sort((a,b)=>b.probability-a.probability);

    let best = sorted[0];
    let second = sorted[1];

    let species = "該当なし";

    if (
      best.className !== "該当なし" &&
      best.probability > THRESHOLD &&
      (best.probability - second.probability) > DIFF_THRESHOLD
    ) {
      species = best.className;
    }

    document.getElementById("species").innerText = species;

    // ===== 幅検出 =====
    const width = detectWidth();

    const [label, color] = getDistanceLabel(width, video.videoWidth);
    document.getElementById("distance").innerHTML =
      "<span style='color:" + color + "'>距離：" + label + "</span>";

    if (width === 0) {
      document.getElementById("result").innerText = "-- cm";
      document.getElementById("status").innerText = "対象なし";
      document.getElementById("subResult").innerText =
        "暫定値：" + lastTempDiameter + " cm";
      requestAnimationFrame(loop);
      return;
    }

    let diameterRaw = width * SCALE;
    let tempDiameter = Math.round(diameterRaw);
    lastTempDiameter = tempDiameter;

    diameterHistory.push(diameterRaw);
    if (diameterHistory.length > MAX_DIAMETER_HISTORY) {
      diameterHistory.shift();
    }

    let sum = 0;
    diameterHistory.forEach(d => sum += d);
    let diameter = sum / diameterHistory.length;

    if (Math.abs(diameter - prevDiameter) < 1) {
      diameter = prevDiameter;
    }

    prevDiameter = diameter;
    diameter = Math.round(diameter);

    if (Math.abs(diameter - stableDiameter) < STABLE_THRESHOLD) {
      stableCount++;
    } else {
      stableCount = 0;
    }

    stableDiameter = diameter;

    if (stableCount >= STABLE_FRAMES) {
      document.getElementById("result").innerHTML =
        "<span style='color:yellow'>" + diameter + " cm</span>";
      document.getElementById("status").innerText = "測定完了";
      if (navigator.vibrate) navigator.vibrate(200);
    } else {
      document.getElementById("result").innerHTML =
        "<span class='measuring'>" + diameter + " cm</span>";
      document.getElementById("status").innerText = "測定中...";
    }

    document.getElementById("subResult").innerText =
      "暫定値：" + lastTempDiameter + " cm";
  }

  requestAnimationFrame(loop);
}

// ===== 改良版 幹検出 =====
function detectWidth() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

  const width = canvas.width;
  const height = canvas.height;
  const center = Math.floor(width / 2);

  let widths = [];

  for (let y = Math.floor(height * 0.3); y < Math.floor(height * 0.7); y += 20) {

    let left = center;
    let right = center;

    // 左
    for (let x = center; x > 5; x--) {
      const i = (y * width + x) * 4;
      const i2 = (y * width + (x - 5)) * 4;

      const diff =
        Math.abs(img.data[i] - img.data[i2]) +
        Math.abs(img.data[i+1] - img.data[i2+1]) +
        Math.abs(img.data[i+2] - img.data[i2+2]);

      if (diff > 60) break;
      left = x;
    }

    // 右
    for (let x = center; x < width - 5; x++) {
      const i = (y * width + x) * 4;
      const i2 = (y * width + (x + 5)) * 4;

      const diff =
        Math.abs(img.data[i] - img.data[i2]) +
        Math.abs(img.data[i+1] - img.data[i2+1]) +
        Math.abs(img.data[i+2] - img.data[i2+2]);

      if (diff > 60) break;
      right = x;
    }

    const w = right - left;

    if (w > 30 && w < width * 0.9) {
      widths.push(w);
    }
  }

  if (widths.length < 3) return 0;

  widths.sort((a,b)=>a-b);
  return widths[Math.floor(widths.length/2)];
}
</script>

</body>
</html>
