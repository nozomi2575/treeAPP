<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹種＋直径測定 v5.0</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

/* バージョン */
#version {
  font-size: 16px;
  color: gray;
  margin: 5px;
}

/* ガイド */
#guide {
  font-size: 20px;
  color: #ccc;
  margin: 10px;
}

/* ボタン */
button {
  width: 90%;
  max-width: 500px;
  font-size: 28px;
  padding: 18px;
  margin: 10px auto;
  border-radius: 15px;
  display: block;
}

#startBtn { background: #2ecc71; }
#scaleBtn { background: orange; }
#recordBtn { background: red; }

/* 映像 */
#videoWrapper {
  position: relative;
}

#webcam {
  width: 95vw;
  max-width: 600px;
}

/* 中央線 */
#line {
  position: absolute;
  left: 50%;
  width: 4px;
  height: 100%;
  background: red;
}

/* コの字 */
#scaleBox {
  position: absolute;
  top: 25%;
  left: 20%;
  width: 60%;
  height: 20%;
  border: 4px solid red;
  border-bottom: none;
  display: none;
}

/* 表示 */
.box {
  background: rgba(0,0,0,0.7);
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

#species { font-size: 50px; color: cyan; }
#result { font-size: 70px; }
#sub { font-size: 30px; color: gray; }
#status { font-size: 28px; }
#scaleInfo { font-size: 22px; color: yellow; }

</style>
</head>

<body>

<div id="version">v5.0 最終UI版</div>

<div id="guide">
①開始 → ②スケール → ③記録 → 測定
</div>

<button id="startBtn">① ▶開始</button>
<button id="scaleBtn">② 📏スケール設定</button>
<button id="recordBtn">③ ✔記録（cm入力）</button>

<div id="videoWrapper">
  <video id="webcam" playsinline></video>
  <div id="line"></div>
  <div id="scaleBox"></div>
</div>

<div class="box">
  <div id="species">---</div>
  <div id="result">-- cm</div>
  <div id="status">待機中</div>
  <div id="sub">暫定：-- cm</div>
  <div id="scaleInfo">スケール未設定</div>
</div>

<canvas id="freezeCanvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/vcoNkn6Is/";

let model, video;

let mode = "measure";
let scale = null;

let frozen = false;
let frozenImage = null;

let diameterHistory = [];

document.getElementById("startBtn").onclick = init;
document.getElementById("scaleBtn").onclick = enterScaleMode;
document.getElementById("recordBtn").onclick = recordScale;

async function init() {
  model = await tmImage.load(URL+"model.json", URL+"metadata.json");

  video = document.getElementById("webcam");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    loop();
  };
}

// ===== スケールモード =====
function enterScaleMode() {
  mode = "scale";
  frozen = false;
  document.getElementById("scaleBox").style.display = "block";
  document.getElementById("status").innerText = "② スケールを枠に合わせる";
}

// ===== 記録（フリーズ） =====
function recordScale() {
  if (mode !== "scale") return;

  const canvas = document.getElementById("freezeCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);
  frozenImage = ctx.getImageData(0, 0, canvas.width, canvas.height);
  frozen = true;

  const width = detectWidth();

  if (width === 0) {
    alert("スケール検出失敗");
    return;
  }

  const real = prompt("この幅は何cmですか？");
  if (!real) return;

  scale = real / width;

  document.getElementById("scaleInfo").innerText =
    "スケール設定済：" + real + "cm";

  document.getElementById("scaleBox").style.display = "none";
  mode = "measure";
}

// ===== メイン =====
async function loop() {
  if (video.readyState === 4) {

    const prediction = await model.predict(video);
    let best = prediction.sort((a,b)=>b.probability-a.probability)[0];

    document.getElementById("species").innerText =
      best.probability > 0.7 ? best.className : "該当なし";

    const width = detectWidth();

    if (mode === "scale") {
      requestAnimationFrame(loop);
      return;
    }

    if (!scale || width === 0) {
      document.getElementById("status").innerText = "測定不可";
      requestAnimationFrame(loop);
      return;
    }

    let diameter = Math.round(width * scale);

    diameterHistory.push(diameter);
    if (diameterHistory.length > 5) diameterHistory.shift();

    let avg = diameterHistory.reduce((a,b)=>a+b,0) / diameterHistory.length;
    avg = Math.round(avg);

    document.getElementById("result").innerText = avg + " cm";
    document.getElementById("sub").innerText = "暫定：" + diameter + " cm";
    document.getElementById("status").innerText = "③ 測定中";
  }

  requestAnimationFrame(loop);
}

// ===== 幅検出 =====
function detectWidth() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  if (frozen && frozenImage) {
    ctx.putImageData(frozenImage, 0, 0);
  } else {
    ctx.drawImage(video, 0, 0);
  }

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

  const w = canvas.width;
  const h = canvas.height;
  const center = Math.floor(w/2);

  let left = center;
  let right = center;

  for (let x = center; x > 5; x--) {
    const i = (Math.floor(h/2)*w + x)*4;
    const i2 = (Math.floor(h/2)*w + (x-5))*4;

    const diff =
      Math.abs(img.data[i]-img.data[i2]) +
      Math.abs(img.data[i+1]-img.data[i2+1]) +
      Math.abs(img.data[i+2]-img.data[i2+2]);

    if (diff > 60) break;
    left = x;
  }

  for (let x = center; x < w-5; x++) {
    const i = (Math.floor(h/2)*w + x)*4;
    const i2 = (Math.floor(h/2)*w + (x+5))*4;

    const diff =
      Math.abs(img.data[i]-img.data[i2]) +
      Math.abs(img.data[i+1]-img.data[i2+1]) +
      Math.abs(img.data[i+2]-img.data[i2+2]);

    if (diff > 60) break;
    right = x;
  }

  const width = right - left;

  if (width < 20 || width > w*0.9) return 0;

  return width;
}
</script>

</body>
</html>
