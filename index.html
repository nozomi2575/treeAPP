<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹種＋直径測定 v6.1</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

#version { font-size: 16px; color: gray; margin: 5px; }

button {
  width: 90%;
  max-width: 500px;
  font-size: 28px;
  padding: 18px;
  margin: 10px auto;
  border-radius: 15px;
  display: block;
}

#startBtn { background: #2ecc71; }
#handBtn { background: orange; }

#videoWrapper {
  position: relative;
  display: inline-block;
}

#webcam {
  width: 95vw;
  max-width: 600px;
}

/* 中央線 */
#line {
  position: absolute;
  top: 0;
  left: 50%;
  width: 4px;
  height: 100%;
  background: red;
  transform: translateX(-50%);
}

/* 幹ガイド */
#guideBox {
  position: absolute;
  top: 40%;
  left: 35%;
  width: 30%;
  height: 20%;
  border: 3px solid yellow;
}

/* 手ガイド */
#handGuide {
  position: absolute;
  top: 35%;
  left: 30%;
  width: 40%;
  height: 25%;
  border: 3px dashed cyan;
  display: none;
}

.box {
  background: rgba(0,0,0,0.7);
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

#species { font-size: 50px; color: cyan; }
#result { font-size: 70px; }
#sub { font-size: 30px; color: gray; }
#status { font-size: 32px; }
#scaleInfo { font-size: 22px; color: yellow; }

</style>
</head>

<body>

<div id="version">v6.1 片手対応版</div>

<button id="startBtn">① ▶開始</button>
<button id="handBtn">② ✋手を登録</button>

<div id="videoWrapper">
  <video id="webcam" playsinline></video>
  <div id="line"></div>
  <div id="guideBox"></div>
  <div id="handGuide"></div>
</div>

<div class="box">
  <div id="species">---</div>
  <div id="result">-- cm</div>
  <div id="status">待機中</div>
  <div id="sub">暫定：-- cm</div>
  <div id="scaleInfo">手スケール未登録</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/vcoNkn6Is/";

let model, video;
let scale = null;
let diameterHistory = [];
let handMode = false;
let handStableCount = 0;

const HAND_WIDTH_CM = 8;

document.getElementById("startBtn").onclick = init;
document.getElementById("handBtn").onclick = enterHandMode;

async function init() {
  model = await tmImage.load(URL+"model.json", URL+"metadata.json");

  video = document.getElementById("webcam");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    loop();
  };
}

function enterHandMode() {
  handMode = true;
  handStableCount = 0;
  document.getElementById("handGuide").style.display = "block";
  document.getElementById("status").innerText = "手を枠に入れてください";
}

function getMedian(arr) {
  const sorted = [...arr].sort((a,b)=>a-b);
  return sorted[Math.floor(sorted.length/2)];
}

async function loop() {
  if (video.readyState === 4) {

    const width = detectWidth();

    // ===== 手登録モード =====
    if (handMode) {

      if (width > 50) {
        handStableCount++;
      } else {
        handStableCount = 0;
      }

      if (handStableCount > 10) {
        scale = HAND_WIDTH_CM / width;
        handMode = false;

        document.getElementById("handGuide").style.display = "none";
        document.getElementById("scaleInfo").innerText =
          "手スケール設定済（" + HAND_WIDTH_CM + "cm）";

        document.getElementById("status").innerText = "登録完了";
      }

      requestAnimationFrame(loop);
      return;
    }

    // ===== 通常測定 =====
    const prediction = await model.predict(video);
    let best = prediction.sort((a,b)=>b.probability-a.probability)[0];

    document.getElementById("species").innerText =
      best.probability > 0.7 ? best.className : "該当なし";

    if (!scale || width === 0) {
      requestAnimationFrame(loop);
      return;
    }

    let diameter = Math.round(width * scale);

    diameterHistory.push(diameter);
    if (diameterHistory.length > 5) diameterHistory.shift();

    let stable = getMedian(diameterHistory);

    document.getElementById("result").innerText = stable + " cm";
    document.getElementById("sub").innerText = "暫定：" + diameter + " cm";
    document.getElementById("status").innerText = "測定中";
  }

  requestAnimationFrame(loop);
}

// 検出ロジック
function detectWidth() {
  if (!video.videoWidth) return 0;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

  const w = canvas.width;
  const h = canvas.height;

  const centerX = Math.floor(w / 2);
  const centerY = Math.floor(h / 2);

  const scanHalfWidth = Math.floor(w * 0.15);
  const scanHeight = Math.floor(h * 0.2);

  let left = centerX;
  let right = centerX;

  for (let x = centerX; x > centerX - scanHalfWidth; x--) {
    let diff = 0;
    for (let dy = -scanHeight/2; dy < scanHeight/2; dy += 2) {
      const y = centerY + dy;
      const i = (y * w + x) * 4;
      const i2 = (y * w + (x-3)) * 4;
      diff += Math.abs(img.data[i] - img.data[i2]);
    }
    if (diff > 80) break;
    left = x;
  }

  for (let x = centerX; x < centerX + scanHalfWidth; x++) {
    let diff = 0;
    for (let dy = -scanHeight/2; dy < scanHeight/2; dy += 2) {
      const y = centerY + dy;
      const i = (y * w + x) * 4;
      const i2 = (y * w + (x+3)) * 4;
      diff += Math.abs(img.data[i] - img.data[i2]);
    }
    if (diff > 80) break;
    right = x;
  }

  const width = right - left;

  if (width < 50 || width > w * 0.6) return 0;

  return width;
}
</script>

</body>
</html>
