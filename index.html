<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>樹皮判別</title>
</head>

<body>
  <h2>樹皮判別アプリ</h2>
  <button id="startBtn">開始</button>
  <br><br>

  <video id="webcam" autoplay playsinline width="300"></video>
  <div id="label-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/vcoNkn6Is/";

    let model, video;

    document.getElementById("startBtn").addEventListener("click", init);

    async function init() {
      try {
        // モデル読み込み
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);

        video = document.getElementById("webcam");

        // カメラ一覧取得
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === "videoinput");

        console.log("カメラ一覧:", videoDevices);

        // 背面カメラを探す（iPhone対策）
        let backCamera = videoDevices.find(d =>
          d.label.toLowerCase().includes("back") ||
          d.label.toLowerCase().includes("rear")
        );

        // 見つからない場合は最後のカメラを使う
        if (!backCamera) {
          backCamera = videoDevices[videoDevices.length - 1];
        }

        // カメラ起動
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: backCamera.deviceId }
        });

        video.srcObject = stream;

        // 判定ループ開始
        loop();

      } catch (e) {
        alert("エラー：" + e);
        console.error(e);
      }
    }

    async function loop() {
      if (video.readyState === 4) {
        const prediction = await model.predict(video);

        // 一番確率の高いものを選択
        let best = prediction[0];
        for (let i = 1; i < prediction.length; i++) {
          if (prediction[i].probability > best.probability) {
            best = prediction[i];
          }
        }

        document.getElementById("label-container").innerHTML =
          "<h1>" + best.className + "</h1>" +
          "<h2>" + (best.probability * 100).toFixed(1) + "%</h2>";
      }

      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
