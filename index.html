<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹種＋直径測定 v9.5</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

button{
  width:90%;
  font-size:30px;
  padding:20px;
  margin:10px;
  border-radius:12px;
}

#startBtn{background:#2ecc71;}
#handBtn{background:orange;}

video{
  width:95%;
  max-width:650px;
}

.box{margin-top:10px;}
#species{font-size:50px;color:cyan;}
#result{font-size:80px;}
#sub{font-size:30px;color:gray;}
#status{font-size:28px;color:yellow;}
#error{color:red;}
#debug{color:lime;font-size:20px;}
</style>
</head>

<body>

<h2>v9.5 最終安定版</h2>

<button id="startBtn">①開始</button>
<button id="handBtn">②手を登録</button>

<video id="webcam" autoplay playsinline crossorigin="anonymous"></video>

<div class="box">
<div id="species">---</div>
<div id="result">-- cm</div>
<div id="sub">暫定：--</div>
<div id="status">待機中</div>
<div id="debug">width: --</div>
<div id="error"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image"></script>

<script>
const URL="https://teachablemachine.withgoogle.com/models/vcoNkn6Is/";

let video=document.getElementById("webcam");
let model;

let scale=null;
let handMode=false;

let widthHistory=[];
let diameterHistory=[];

const HAND_CM=8;

// =================
// カメラ
// =================
async function start(){

if(location.protocol!=="https:" && location.hostname!=="localhost"){
  error("HTTPSまたはlocalhostで開いてください");
  return;
}

try{
  status("カメラ起動中");

  const stream=await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" },
    audio:false
  });

  video.srcObject=stream;

  video.onloadedmetadata=async()=>{
    video.play();
    model=await tmImage.load(URL+"model.json",URL+"metadata.json");
    status("起動成功");
    loop();
  };

}catch(e){
  error(e.message);
}
}

// =================
// 手登録
// =================
function hand(){
  handMode=true;
  widthHistory=[];
  status("手を入れてください");
}

// =================
// ループ
// =================
async function loop(){

let w = handMode ? detectHand() : detectTree();

document.getElementById("debug").innerText="width: "+w;

// ===== 手登録 =====
if(handMode){

  if(w===0){
    status("手を映してください");
    requestAnimationFrame(loop);
    return;
  }

  widthHistory.push(w);
  if(widthHistory.length>20)widthHistory.shift();

  if(widthHistory.length<10){
    status("そのままキープ");
    requestAnimationFrame(loop);
    return;
  }

  let m=median(widthHistory);

  scale=HAND_CM/m;
  handMode=false;

  status("登録完了");

  requestAnimationFrame(loop);
  return;
}

// ===== 幹測定 =====
if(scale && w>0){

  let d=Math.round(w*scale);

  diameterHistory.push(d);
  if(diameterHistory.length>5)diameterHistory.shift();

  let stable=median(diameterHistory);

  document.getElementById("result").innerText=stable+" cm";
  document.getElementById("sub").innerText="暫定："+d+" cm";
  status("測定中");

}else{
  status("幹を映してください");
}

// ===== 樹種 =====
if(model){
let p=await model.predict(video);
let best=p.sort((a,b)=>b.probability-a.probability)[0];
document.getElementById("species").innerText=
best.probability>0.7?best.className:"不明";
}

requestAnimationFrame(loop);
}

// =================
// 手検出（固定canvas版）
// =================
function detectHand(){

if(video.readyState!==4) return 0;

let c=document.createElement("canvas");
let ctx=c.getContext("2d");

// ★固定サイズ（最重要）
c.width=320;
c.height=240;

ctx.drawImage(video,0,0,320,240);

let img=ctx.getImageData(0,0,320,240);

let y=120;

let left=-1,right=-1;

for(let x=0;x<320;x++){

let i=(y*320+x)*4;
let bright=(img.data[i]+img.data[i+1]+img.data[i+2])/3;

if(bright>30){
if(left===-1) left=x;
right=x;
}
}

if(left===-1 || right===-1) return 0;

return right-left;
}

// =================
// 幹検出（固定canvas版）
// =================
function detectTree(){

if(video.readyState!==4) return 0;

let c=document.createElement("canvas");
let ctx=c.getContext("2d");

c.width=320;
c.height=240;

ctx.drawImage(video,0,0,320,240);

let img=ctx.getImageData(0,0,320,240);

let samples=[];

for(let y=100;y<140;y+=3){

let edges=[];

for(let x=0;x<319;x++){

let i1=(y*320+x)*4;
let i2=(y*320+x+1)*4;

let g1=(img.data[i1]+img.data[i1+1]+img.data[i1+2])/3;
let g2=(img.data[i2]+img.data[i2+1]+img.data[i2+2])/3;

if(Math.abs(g1-g2)>8) edges.push(x);
}

if(edges.length>2){
samples.push(edges[edges.length-1]-edges[0]);
}
}

if(samples.length<2) return 0;

return median(samples);
}

// =================
// utils
// =================
function median(a){
let s=[...a].sort((x,y)=>x-y);
return s[Math.floor(s.length/2)];
}

function status(t){document.getElementById("status").innerText=t;}
function error(t){document.getElementById("error").innerText=t;}

document.getElementById("startBtn").onclick=start;
document.getElementById("handBtn").onclick=hand;

</script>

</body>
</html>
