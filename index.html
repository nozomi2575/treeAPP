<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹種＋直径測定 v6.3</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

#version { font-size: 16px; color: gray; margin: 5px; }

button {
  width: 90%;
  max-width: 500px;
  font-size: 28px;
  padding: 18px;
  margin: 10px auto;
  border-radius: 15px;
  display: block;
}

#startBtn { background: #2ecc71; }
#handBtn { background: orange; }

#videoWrapper {
  position: relative;
  display: inline-block;
}

#webcam {
  width: 95vw;
  max-width: 600px;
}

/* 中央線 */
#line {
  position: absolute;
  top: 0;
  left: 50%;
  width: 4px;
  height: 100%;
  background: red;
  transform: translateX(-50%);
}

/* 幹ガイド */
#guideBox {
  position: absolute;
  top: 40%;
  left: 35%;
  width: 30%;
  height: 20%;
  border: 3px solid yellow;
}

/* 手ガイド */
#handGuide {
  position: absolute;
  top: 40%;
  left: 20%;
  width: 60%;
  height: 15%;
  border: 4px dashed cyan;
  display: none;
}

/* 状態色 */
.ok { border-color: lime !important; }
.ng { border-color: red !important; }

.box {
  background: rgba(0,0,0,0.7);
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

#species { font-size: 50px; color: cyan; }
#result { font-size: 70px; }
#sub { font-size: 30px; color: gray; }
#status { font-size: 32px; }
#scaleInfo { font-size: 22px; color: yellow; }

#instruction {
  font-size: 22px;
  margin: 10px;
  color: orange;
}
</style>
</head>

<body>

<div id="version">v6.3 手登録安定版</div>

<div id="instruction">② 手のひらを横向きにして枠に入れてください</div>

<button id="startBtn">① ▶開始</button>
<button id="handBtn">② ✋手を登録</button>

<div id="videoWrapper">
  <video id="webcam" playsinline></video>
  <div id="line"></div>
  <div id="guideBox"></div>
  <div id="handGuide"></div>
</div>

<div class="box">
  <div id="species">---</div>
  <div id="result">-- cm</div>
  <div id="status">待機中</div>
  <div id="sub">暫定：-- cm</div>
  <div id="scaleInfo">手スケール未登録</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/vcoNkn6Is/";

let model, video;
let scale = null;
let diameterHistory = [];

let handMode = false;
let stableCount = 0;

const HAND_WIDTH_CM = 8;

document.getElementById("startBtn").onclick = init;
document.getElementById("handBtn").onclick = enterHandMode;

async function init() {
  model = await tmImage.load(URL+"model.json", URL+"metadata.json");

  video = document.getElementById("webcam");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    loop();
  };
}

function enterHandMode() {
  handMode = true;
  stableCount = 0;
  document.getElementById("handGuide").style.display = "block";
  document.getElementById("status").innerText = "手を枠に入れてください";
}

function getMedian(arr) {
  const sorted = [...arr].sort((a,b)=>a-b);
  return sorted[Math.floor(sorted.length/2)];
}

async function loop() {
  if (video.readyState === 4) {

    const { width, height } = detectWH();

    // ===== 手登録モード =====
    if (handMode) {

      let guide = document.getElementById("handGuide");

      // 未検出（ここが今回の肝）
      if (width === 0) {
        guide.classList.remove("ok","ng");
        document.getElementById("status").innerText = "手を枠に入れてください";
        stableCount = 0;
        requestAnimationFrame(loop);
        return;
      }

      // 縦向き
      if (height > width) {
        guide.classList.remove("ok");
        guide.classList.add("ng");
        document.getElementById("status").innerText = "横向きにしてください";
        stableCount = 0;
      }
      // 小さい
      else if (width < 60) {
        guide.classList.remove("ok");
        guide.classList.add("ng");
        document.getElementById("status").innerText = "手を近づけてください";
        stableCount = 0;
      }
      // OK
      else {
        guide.classList.remove("ng");
        guide.classList.add("ok");
        document.getElementById("status").innerText = "OK";

        stableCount++;

        if (stableCount > 10) {
          scale = HAND_WIDTH_CM / width;
          handMode = false;

          guide.style.display = "none";

          document.getElementById("scaleInfo").innerText =
            "手スケール設定済（" + HAND_WIDTH_CM + "cm）";

          document.getElementById("status").innerText = "登録完了";
        }
      }

      requestAnimationFrame(loop);
      return;
    }

    // ===== 通常測定 =====
    const prediction = await model.predict(video);
    let best = prediction.sort((a,b)=>b.probability-a.probability)[0];

    document.getElementById("species").innerText =
      best.probability > 0.7 ? best.className : "該当なし";

    if (!scale || width === 0) {
      requestAnimationFrame(loop);
      return;
    }

    let diameter = Math.round(width * scale);

    diameterHistory.push(diameter);
    if (diameterHistory.length > 5) diameterHistory.shift();

    let stable = getMedian(diameterHistory);

    document.getElementById("result").innerText = stable + " cm";
    document.getElementById("sub").innerText = "暫定：" + diameter + " cm";
    document.getElementById("status").innerText = "測定中";
  }

  requestAnimationFrame(loop);
}

// 幅＋高さ取得（安定版）
function detectWH() {
  if (!video.videoWidth) return { width:0, height:0 };

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

  const w = canvas.width;
  const h = canvas.height;

  const cx = Math.floor(w/2);
  const cy = Math.floor(h/2);

  let left=cx, right=cx, top=cy, bottom=cy;

  for (let x=cx; x>cx-200; x--) {
    if (Math.abs(img.data[(cy*w+x)*4] - img.data[(cy*w+x-3)*4]) > 80) break;
    left = x;
  }

  for (let x=cx; x<cx+200; x++) {
    if (Math.abs(img.data[(cy*w+x)*4] - img.data[(cy*w+x+3)*4]) > 80) break;
    right = x;
  }

  for (let y=cy; y>cy-200; y--) {
    if (Math.abs(img.data[(y*w+cx)*4] - img.data[((y-3)*w+cx)*4]) > 80) break;
    top = y;
  }

  for (let y=cy; y<cy+200; y++) {
    if (Math.abs(img.data[(y*w+cx)*4] - img.data[((y+3)*w+cx)*4]) > 80) break;
    bottom = y;
  }

  let width = right - left;
  let height = bottom - top;

  if (width < 30) return { width:0, height:0 };

  return { width, height };
}
</script>

</body>
</html>
