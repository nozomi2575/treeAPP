<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹種＋直径測定</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

#version {
  position: fixed;
  bottom: 5px;
  right: 10px;
  font-size: 12px;
  color: gray;
}

#videoWrapper {
  position: relative;
  display: inline-block;
}

#webcam {
  width: 300px;
}

/* 中央ライン */
#line {
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 100%;
  background: red;
}

#result {
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="version">v1.2</div>

<h2>樹種＋直径測定</h2>
<button id="startBtn">開始</button><br><br>

<div id="videoWrapper">
  <video id="webcam" playsinline></video>
  <div id="line"></div>
</div>

<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/vcoNkn6Is/";

let model, video;

let history = [];
const MAX_HISTORY = 10;

// ★直径安定化
let diameterHistory = [];
const MAX_DIAMETER_HISTORY = 10;
let prevDiameter = 0;

const THRESHOLD = 0.7;
const DIFF_THRESHOLD = 0.1;

// ★直径変換係数（現場で調整）
const SCALE = 0.2;

document.getElementById("startBtn").addEventListener("click", init);

async function init() {
  const modelURL = URL + "model.json";
  const metadataURL = URL + "metadata.json";

  model = await tmImage.load(modelURL, metadataURL);

  video = document.getElementById("webcam");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    loop();
  };
}

async function loop() {
  if (video.readyState === 4) {

    // ===== 樹種判別 =====
    const prediction = await model.predict(video);

    history.push(prediction);
    if (history.length > MAX_HISTORY) history.shift();

    let avg = {};
    history.forEach(p => {
      p.forEach(item => {
        avg[item.className] = (avg[item.className] || 0) + item.probability;
      });
    });

    let sorted = Object.keys(avg).map(k => ({
      className: k,
      probability: avg[k] / history.length
    })).sort((a,b)=>b.probability-a.probability);

    let best = sorted[0];
    let second = sorted[1];

    let species = "該当なし";

    if (
      best.className !== "該当なし" &&
      best.probability > THRESHOLD &&
      (best.probability - second.probability) > DIFF_THRESHOLD
    ) {
      species = best.className;
    }

    // ===== 直径測定 =====
    const width = detectWidth();

    // ★幹が検出できない場合
    if (width === 0) {
      document.getElementById("result").innerHTML =
        "<div style='font-size:30px'>" + species + "</div>" +
        "<div style='font-size:40px'>-- cm</div>";
      requestAnimationFrame(loop);
      return;
    }

    let diameterRaw = width * SCALE;

    // ★履歴平均（安定化）
    diameterHistory.push(diameterRaw);
    if (diameterHistory.length > MAX_DIAMETER_HISTORY) {
      diameterHistory.shift();
    }

    let sum = 0;
    diameterHistory.forEach(d => sum += d);
    let diameter = sum / diameterHistory.length;

    // ★微小変動を抑える
    if (Math.abs(diameter - prevDiameter) < 1) {
      diameter = prevDiameter;
    }

    prevDiameter = diameter;

    diameter = Math.round(diameter);

    document.getElementById("result").innerHTML =
      "<div style='font-size:30px'>" + species + "</div>" +
      "<div style='font-size:40px'>" + diameter + " cm</div>";
  }

  requestAnimationFrame(loop);
}

// ===== 幹検出ロジック（安定版） =====
function detectWidth() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

  const width = canvas.width;
  const height = canvas.height;
  const center = Math.floor(width / 2);

  let widths = [];

  // ★複数ラインで測定
  for (let y = Math.floor(height*0.3); y < Math.floor(height*0.7); y += 20) {

    let left = center;
    let right = center;

    for (let x = center; x > 0; x--) {
      const i = (y * width + x) * 4;
      const gray = (img.data[i] + img.data[i+1] + img.data[i+2]) / 3;
      if (gray < 50 || gray > 220) break;
      left = x;
    }

    for (let x = center; x < width; x++) {
      const i = (y * width + x) * 4;
      const gray = (img.data[i] + img.data[i+1] + img.data[i+2]) / 3;
      if (gray < 50 || gray > 220) break;
      right = x;
    }

    widths.push(right - left);
  }

  // ★中央値
  widths.sort((a,b)=>a-b);
  const median = widths[Math.floor(widths.length/2)];

  const min = widths[0];
  const max = widths[widths.length-1];

  // ★ばらつきチェック（緩め）
  if (max - min > 80) return 0;

  // ★異常に大きい場合
  if (median > width * 0.8) return 0;

  return median;
}
</script>

</body>
</html>
