<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹種＋直径測定</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

#videoWrapper {
  position: relative;
  display: inline-block;
}

#webcam {
  width: 300px;
}

/* 中央ライン */
#line {
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 100%;
  background: red;
}

#result {
  margin-top: 10px;
}
</style>
</head>

<body>

<h2>樹種＋直径測定</h2>
<button id="startBtn">開始</button><br><br>

<div id="videoWrapper">
  <video id="webcam" playsinline></video>
  <div id="line"></div>
</div>

<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "ここにモデルURL";

let model, video;

let history = [];
const MAX_HISTORY = 10;

const THRESHOLD = 0.7;
const DIFF_THRESHOLD = 0.1;

// ★直径変換係数（あとで調整）
const SCALE = 0.2;

document.getElementById("startBtn").addEventListener("click", init);

async function init() {
  const modelURL = URL + "model.json";
  const metadataURL = URL + "metadata.json";

  model = await tmImage.load(modelURL, metadataURL);

  video = document.getElementById("webcam");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" },
    audio: false
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    loop();
  };
}

async function loop() {
  if (video.readyState === 4) {

    // ===== 樹種判別 =====
    const prediction = await model.predict(video);

    history.push(prediction);
    if (history.length > MAX_HISTORY) history.shift();

    let avg = {};
    history.forEach(p => {
      p.forEach(item => {
        avg[item.className] = (avg[item.className] || 0) + item.probability;
      });
    });

    let sorted = Object.keys(avg).map(k => ({
      className: k,
      probability: avg[k] / history.length
    })).sort((a,b)=>b.probability-a.probability);

    let best = sorted[0];
    let second = sorted[1];

    let species = "該当なし";

    if (
      best.className !== "該当なし" &&
      best.probability > THRESHOLD &&
      (best.probability - second.probability) > DIFF_THRESHOLD
    ) {
      species = best.className;
    }

    // ===== 直径測定（簡易） =====
    const width = detectWidth();

    let diameter = Math.round(width * SCALE);

    document.getElementById("result").innerHTML =
      "<div style='font-size:30px'>" + species + "</div>" +
      "<div style='font-size:40px'>" + diameter + " cm</div>";
  }

  requestAnimationFrame(loop);
}

// ★幹の幅を検出（簡易）
function detectWidth() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const centerX = Math.floor(canvas.width / 2);

  let left = centerX;
  let right = centerX;

  // 左へ探索
  for (let x = centerX; x > 0; x--) {
    const i = (Math.floor(canvas.height/2) * canvas.width + x) * 4;
    if (img.data[i] < 100) break;
    left = x;
  }

  // 右へ探索
  for (let x = centerX; x < canvas.width; x++) {
    const i = (Math.floor(canvas.height/2) * canvas.width + x) * 4;
    if (img.data[i] < 100) break;
    right = x;
  }

  return right - left;
}
</script>

</body>
</html>
