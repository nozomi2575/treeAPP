<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>樹種＋直径測定 v7.0</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

#version { font-size: 18px; color: gray; margin: 5px; }

button {
  width: 90%;
  max-width: 500px;
  font-size: 30px;
  padding: 20px;
  margin: 10px auto;
  border-radius: 15px;
  display: block;
}

#startBtn { background: #2ecc71; }
#handBtn { background: orange; }

#videoWrapper {
  position: relative;
  display: inline-block;
}

#webcam {
  width: 95vw;
  max-width: 650px;
}

/* 幹ガイド */
#guideBox {
  position: absolute;
  top: 40%;
  left: 35%;
  width: 30%;
  height: 20%;
  border: 4px solid yellow;
}

/* 手ガイド */
#handGuide {
  position: absolute;
  top: 40%;
  left: 20%;
  width: 60%;
  height: 15%;
  border: 4px dashed cyan;
  display: none;
}

.ok { border-color: lime !important; }
.ng { border-color: red !important; }

.box {
  background: rgba(0,0,0,0.7);
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

#species { font-size: 55px; color: cyan; }
#result { font-size: 80px; }
#sub { font-size: 35px; color: gray; }
#status { font-size: 35px; }
#scaleInfo { font-size: 25px; color: yellow; }
#distanceInfo { font-size: 25px; color: orange; }

#instruction {
  font-size: 24px;
  margin: 10px;
  color: orange;
}
</style>
</head>

<body>

<div id="version">v7.0 完全版</div>

<div id="instruction">
①開始 → ②手登録（横向き） → ③同じ距離で測定
</div>

<button id="startBtn">① ▶開始</button>
<button id="handBtn">② ✋手を登録</button>

<div id="videoWrapper">
  <video id="webcam" playsinline></video>
  <div id="guideBox"></div>
  <div id="handGuide"></div>
</div>

<div class="box">
  <div id="species">---</div>
  <div id="result">-- cm</div>
  <div id="sub">暫定：-- cm</div>
  <div id="status">待機中</div>
  <div id="scaleInfo">手スケール未登録</div>
  <div id="distanceInfo"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/vcoNkn6Is/";

let model, video;
let scale = null;
let baseWidth = null;

let diameterHistory = [];
let widthHistory = [];

let handMode = false;
let stableCount = 0;

const HAND_WIDTH_CM = 8;

document.getElementById("startBtn").onclick = init;
document.getElementById("handBtn").onclick = enterHandMode;

async function init() {
  model = await tmImage.load(URL+"model.json", URL+"metadata.json");

  video = document.getElementById("webcam");

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    loop();
  };
}

function enterHandMode() {
  handMode = true;
  stableCount = 0;
  widthHistory = [];
  document.getElementById("handGuide").style.display = "block";
  document.getElementById("status").innerText = "手を枠に入れてください";
}

function getMedian(arr) {
  const sorted = [...arr].sort((a,b)=>a-b);
  return sorted[Math.floor(sorted.length/2)];
}

async function loop() {
  if (video.readyState === 4) {

    const { width, height } = detectWH();

    // ===== 手登録 =====
    if (handMode) {

      let guide = document.getElementById("handGuide");

      if (width === 0) {
        document.getElementById("status").innerText = "手を枠に入れてください";
        stableCount = 0;
        requestAnimationFrame(loop);
        return;
      }

      if (width < 80) {
        document.getElementById("status").innerText = "手を近づけてください";
        stableCount = 0;
        requestAnimationFrame(loop);
        return;
      }

      if (height > width * 0.8) {
        guide.classList.add("ng");
        document.getElementById("status").innerText = "横向きにしてください";
        stableCount = 0;
        requestAnimationFrame(loop);
        return;
      }

      // 安定判定
      widthHistory.push(width);
      if (widthHistory.length > 10) widthHistory.shift();

      let max = Math.max(...widthHistory);
      let min = Math.min(...widthHistory);

      if (max - min < 10) {
        guide.classList.remove("ng");
        guide.classList.add("ok");
        document.getElementById("status").innerText = "OK（固定してください）";
        stableCount++;
      } else {
        guide.classList.add("ng");
        document.getElementById("status").innerText = "手を動かさないでください";
        stableCount = 0;
      }

      if (stableCount > 15) {
        scale = HAND_WIDTH_CM / getMedian(widthHistory);
        baseWidth = getMedian(widthHistory);
        handMode = false;

        guide.style.display = "none";
        document.getElementById("scaleInfo").innerText = "スケール設定済";
        document.getElementById("status").innerText = "登録完了";
      }

      requestAnimationFrame(loop);
      return;
    }

    // ===== 距離チェック =====
    if (scale && width > 0) {
      let diff = Math.abs(width - baseWidth);

      if (diff > baseWidth * 0.2) {
        document.getElementById("distanceInfo").innerText = "距離が違います";
        document.getElementById("status").innerText = "距離を合わせてください";
        requestAnimationFrame(loop);
        return;
      } else {
        document.getElementById("distanceInfo").innerText = "距離OK";
      }
    }

    // ===== 樹種 =====
    const prediction = await model.predict(video);
    let best = prediction.sort((a,b)=>b.probability-a.probability)[0];

    document.getElementById("species").innerText =
      best.probability > 0.7 ? best.className : "該当なし";

    if (!scale || width === 0) {
      requestAnimationFrame(loop);
      return;
    }

    let diameter = Math.round(width * scale);

    diameterHistory.push(diameter);
    if (diameterHistory.length > 5) diameterHistory.shift();

    let stable = getMedian(diameterHistory);

    document.getElementById("result").innerText = stable + " cm";
    document.getElementById("sub").innerText = "暫定：" + diameter + " cm";
    document.getElementById("status").innerText = "測定中";
  }

  requestAnimationFrame(loop);
}

function detectWH() {
  if (!video.videoWidth) return { width:0, height:0 };

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);

  const w = canvas.width;
  const h = canvas.height;

  const cx = Math.floor(w/2);
  const cy = Math.floor(h/2);

  let left=cx, right=cx, top=cy, bottom=cy;

  for (let x=cx; x>cx-200; x--) {
    if (Math.abs(img.data[(cy*w+x)*4] - img.data[(cy*w+x-3)*4]) > 80) break;
    left = x;
  }

  for (let x=cx; x<cx+200; x++) {
    if (Math.abs(img.data[(cy*w+x)*4] - img.data[(cy*w+x+3)*4]) > 80) break;
    right = x;
  }

  for (let y=cy; y>cy-200; y--) {
    if (Math.abs(img.data[(y*w+cx)*4] - img.data[((y-3)*w+cx)*4]) > 80) break;
    top = y;
  }

  for (let y=cy; y<cy+200; y++) {
    if (Math.abs(img.data[(y*w+cx)*4] - img.data[((y+3)*w+cx)*4]) > 80) break;
    bottom = y;
  }

  let width = right - left;
  let height = bottom - top;

  if (width < 50 || height < 50) return { width:0, height:0 };

  return { width, height };
}
</script>

</body>
</html>
